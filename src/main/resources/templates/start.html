<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <script defer th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <title>Dice Game</title>
</head>
<body>
<header th:fragment="Header" class="container d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
    <h1>Dice Game</h1>
</header>
<main class="container">
    <h2 class="mt-4 mb-3">Roll the Dice</h2>
    <form th:action="@{/roll-dice}">
        <div class="row align-items-baseline">
            <div class="col-auto">
                <label for="c" class="form-label">Number of Dice:</label>
            </div>
            <div class="col-auto">
                <select id="c" th:name="numberOfDice" class="form-select">
                    <option th:value="1">1</option>
                    <option th:value="2">2</option>
                    <option th:value="3" selected>3</option>
                    <option th:value="4">4</option>
                    <option th:value="5">5</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-primary my-3 ms-4">Roll Dice<i class="bi bi-check-lg ms-1"></i></button>
    </form>
</main>
<footer th:fragment="Footer" class="container d-flex flex-column flex-wrap align-items-center py-3 mt-4 border-top">
    <div>PROG27545 / Web Application Design and Implementation</div>
    <div>Sheridan College, Alexander Tetervak</div>
    <div th:text="${#temporals.format(localDate, 'MMMM dd, yyyy')}">March 15, 2023</div>
</footer>
</body>
</html>
