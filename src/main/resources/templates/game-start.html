<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/css/main.css" th:href="@{css/main.css}">
    <link rel="stylesheet" href="../static/css/header.css" th:href="@{css/header.css}">
    <link rel="stylesheet" href="../static/css/footer.css" th:href="@{css/footer.css}">
    <title>Dice Game</title>
</head>
<body>
<header th:fragment="Header">
    <h1>Dice Game</h1>
</header>
<main>
    <h2>Roll the Dice</h2>
    <form action="game-result.html" th:action="@{/roll-dice}">
        <p>
            <label for="c">Number of Dice:</label>
            <select id="c" th:name="numberOfDice">
                <option th:value="1">1</option>
                <option th:value="2">2</option>
                <option th:value="3" selected>3</option>
                <option th:value="4">4</option>
                <option th:value="5">5</option>
            </select>
        </p>
        <p>
            <input type="submit" value="Roll Dice">
        </p>
    </form>
</main>
<footer th:fragment="Footer">
    Sheridan College&nbsp;&nbsp;<span class='hart'>&#9825;</span>&nbsp;&nbsp;
    <span th:text="${#temporals.format(localDate, 'MMMM dd, yyyy')}">March 15, 2023</span>
</footer>
</body>
</html>
